<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>UID Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* WhatsApp-inspired Light Theme Variables */
      --bg-chat: #efeae2;
      --bg-app: #f0f2f5;
      --surface: #ffffff;
      --surface-hover: #f5f6f6;
      --border: #e9edef;
      --primary: #00a884;
      --primary-dark: #008f6f;
      --text-main: #111b21;
      --text-muted: #667781;
      --msg-me: #d9fdd3;
      --msg-them: #ffffff;
      --shadow-sm: 0 1px 2px rgba(11,20,26,.05);
      --shadow-md: 0 2px 5px rgba(11,20,26,.1);
      --radius: 12px;
      --font-main: 'Segoe UI', 'Inter', sans-serif;
    }

    html, body { 
      height: 100%; 
      font-family: var(--font-main); 
      background: var(--bg-app); 
      color: var(--text-main); 
      overflow: hidden; 
    }

    .hidden { display: none !important; }

    /* ─── LOGIN SCREEN ───────────────────────────────── */
    #login-screen {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg-app);
    }

    .login-card {
      background: var(--surface);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      width: 100%; max-width: 400px;
      text-align: center;
      box-shadow: var(--shadow-md);
      animation: fadeUp 0.4s ease both;
    }

    .login-logo {
      width: 64px; height: 64px;
      background: var(--primary);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 1.8rem;
      color: white;
      box-shadow: var(--shadow-sm);
    }

    .login-card h1 {
      font-size: 1.5rem; font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text-main);
    }

    .login-card p { 
      color: var(--text-muted); 
      font-size: 0.95rem; 
      margin-bottom: 2rem; 
      line-height: 1.5; 
    }

    .btn-google {
      width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 0.75rem;
      background: var(--surface);
      border: 1px solid #dadce0;
      color: #3c4043;
      font-family: var(--font-main);
      font-size: 0.95rem; font-weight: 500;
      padding: 0.75rem 1.5rem;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .btn-google:hover { background: #f8f9fa; box-shadow: var(--shadow-sm); }

    /* ─── APP LAYOUT ─────────────────────────────────── */
    #app-screen {
      display: flex; 
      height: 100vh; 
      width: 100vw;
      max-width: 1600px;
      margin: 0 auto;
      background: var(--surface);
      position: relative;
    }

    /* ─── SIDEBAR ────────────────────────────────────── */
    .sidebar {
      width: 380px; flex-shrink: 0;
      display: flex; flex-direction: column;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow: hidden;
      z-index: 10;
      transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .sidebar-header {
      background: var(--bg-app);
      padding: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem;
    }

    .sidebar-top h2 {
      font-size: 1.25rem; font-weight: 600;
    }

    .btn-logout {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 0.85rem; font-weight: 500;
      cursor: pointer;
      transition: color 0.2s;
    }
    .btn-logout:hover { color: #ef4444; }

    /* UID card */
    .uid-card {
      background: var(--surface);
      border-radius: 8px;
      padding: 0.75rem;
      margin-bottom: 0.75rem;
      box-shadow: var(--shadow-sm);
    }

    .uid-label {
      font-size: 0.75rem; font-weight: 600;
      color: var(--primary);
      margin-bottom: 0.4rem;
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    .uid-row {
      display: flex; align-items: center; gap: 0.5rem;
    }

    #my-uid {
      flex: 1;
      background: transparent;
      border: none; outline: none;
      color: var(--text-muted);
      font-family: monospace;
      font-size: 0.85rem;
      white-space: nowrap;
    }

    .btn-copy {
      background: var(--surface-hover);
      color: var(--text-main);
      border: 1px solid var(--border);
      font-size: 0.75rem; font-weight: 500;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-copy:hover { background: #e9edef; }

    /* Add friend */
    .add-friend-form {
      display: flex; gap: 0.5rem;
    }

    .add-friend-form input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.85rem;
      color: var(--text-main);
      font-family: var(--font-main);
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .add-friend-form input:focus { border-color: var(--primary); }

    .btn-add {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0 1rem;
      font-family: var(--font-main);
      font-size: 0.85rem; font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-add:hover { background: var(--primary-dark); }

    /* Friends list */
    #friends-list {
      flex: 1; overflow-y: auto;
      background: var(--surface);
    }
    #friends-list::-webkit-scrollbar { width: 6px; }
    #friends-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); }

    .friends-empty {
      padding: 3rem 2rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .friend-item {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.75rem 1rem;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid var(--bg-app);
    }
    .friend-item:hover { background: var(--surface-hover); }
    .friend-item.active { background: var(--surface-hover); }

    .friend-avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: #dfe5e7;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; font-weight: 500;
      color: white;
      flex-shrink: 0;
    }

    /* Assigning varied colors to avatars based on nth-child for visual flavor */
    .friend-item:nth-child(1n) .friend-avatar { background: #53bdeb; }
    .friend-item:nth-child(2n) .friend-avatar { background: #51a46e; }
    .friend-item:nth-child(3n) .friend-avatar { background: #e07264; }
    .friend-item:nth-child(4n) .friend-avatar { background: #e6a735; }

    .friend-info { overflow: hidden; flex: 1; }
    .friend-name {
      font-size: 1.05rem; font-weight: 400;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: var(--text-main);
    }
    .friend-email {
      font-size: 0.85rem;
      color: var(--text-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: 2px;
    }

    /* ─── CHAT AREA ──────────────────────────────────── */
    .chat-area {
      flex: 1; display: flex; flex-direction: column;
      background: var(--bg-chat);
      position: relative;
    }

    /* WhatsApp background pattern simulation */
    .chat-area::before {
      content: '';
      position: absolute; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M54.627 0l.83.83v58.34l-.83.83H5.373l-.83-.83V.83l.83-.83h49.254zM53.5 1.5H6.5v57h47v-57z' fill='%23e4ddd6' fill-opacity='0.4' fill-rule='evenodd'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    /* Empty state */
    #empty-chat {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.5rem;
      z-index: 1;
      background: var(--bg-app);
    }

    .empty-icon {
      width: 320px;
      height: 180px;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='%23c1cdd4' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12c0 2.16.68 4.15 1.85 5.75L2.4 21.6l3.96-1.39C7.86 21.37 9.87 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm0 18c-1.81 0-3.5-.5-4.96-1.35l-.36-.21-2.67.94.96-2.55-.23-.37C3.58 14.86 3 13.48 3 12c0-4.96 4.04-9 9-9s9 4.04 9 9-4.04 9-9 9z'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
    }

    #empty-chat p {
      font-size: 1.75rem; font-weight: 300;
      color: #41525d;
      margin-top: -20px;
    }
    #empty-chat span {
      font-size: 0.9rem;
      color: var(--text-muted);
      max-width: 400px; text-align: center; line-height: 1.5;
    }

    /* Active chat */
    #active-chat {
      display: flex; flex-direction: column;
      height: 100%; z-index: 1;
    }

    .chat-header {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.6rem 1rem;
      background: var(--bg-app);
      border-bottom: 1px solid var(--border);
    }

    .chat-header-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: #53bdeb;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 500;
      color: white;
      flex-shrink: 0;
    }

    .chat-header-info { flex: 1; }
    #chat-friend-name {
      font-size: 1rem; font-weight: 500; color: var(--text-main);
    }
    .chat-status {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Messages */
    #chat-messages {
      flex: 1; overflow-y: auto;
      padding: 2rem 5%;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    #chat-messages::-webkit-scrollbar { width: 6px; }
    #chat-messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); }

    .msg-bubble {
      max-width: 65%;
      padding: 0.5rem 0.75rem;
      font-size: 0.95rem;
      line-height: 1.4;
      word-wrap: break-word;
      border-radius: 7.5px;
      box-shadow: var(--shadow-sm);
      position: relative;
      animation: popIn 0.2s ease both;
    }

    .msg-me {
      background: var(--msg-me);
      color: var(--text-main);
      margin-left: auto;
      border-top-right-radius: 0;
    }

    .msg-them {
      background: var(--msg-them);
      color: var(--text-main);
      margin-right: auto;
      border-top-left-radius: 0;
    }

    /* Message input */
    #send-message-form {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.75rem 1rem;
      background: var(--bg-app);
    }

    #message-input {
      flex: 1;
      background: var(--surface);
      border: none;
      border-radius: 24px;
      padding: 0.8rem 1.2rem;
      color: var(--text-main);
      font-family: var(--font-main);
      font-size: 0.95rem;
      outline: none;
      box-shadow: var(--shadow-sm);
    }
    #message-input::placeholder { color: var(--text-muted); }

    .btn-send {
      width: 48px; height: 48px;
      flex-shrink: 0;
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s;
      color: var(--text-muted);
    }
    .btn-send:hover { color: var(--primary); }
    .btn-send:active { transform: scale(0.94); }
    .btn-send svg { width: 24px; height: 24px; fill: currentColor; }

    /* ─── ANIMATIONS ─────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ─── RESPONSIVE ─────────────────────────────────── */
    .back-btn {
      display: none;
      background: transparent;
      border: none;
      color: var(--text-muted);
      width: 40px; height: 40px;
      align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      margin-left: -10px;
    }
    
    @media (max-width: 768px) {
      .sidebar { width: 100%; position: absolute; height: 100%; }
      /* When active, slide sidebar left out of view */
      .sidebar.slide-out { transform: translateX(-100%); }
      .chat-area { width: 100%; position: absolute; height: 100%; left: 0; top: 0; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
      /* The JS logic adds "slide-out" to sidebar, so we use sibling selector to slide chat in */
      .sidebar.slide-out + .chat-area { transform: translateX(0); z-index: 20; }
      
      .back-btn { display: flex; }
      #empty-chat { display: none !important; } /* Hide empty chat on mobile to show full friend list */
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(17, 27, 33, 0.85);
      color: white;
      font-size: 0.9rem;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 999;
      box-shadow: var(--shadow-md);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <div id="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <svg viewBox="0 0 24 24" width="32" height="32" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12c0 2.16.68 4.15 1.85 5.75L2.4 21.6l3.96-1.39C7.86 21.37 9.87 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm0 18c-1.81 0-3.5-.5-4.96-1.35l-.36-.21-2.67.94.96-2.55-.23-.37C3.58 14.86 3 13.48 3 12c0-4.96 4.04-9 9-9s9 4.04 9 9-4.04 9-9 9z"/></svg>
      </div>
      <h1>UID Chat</h1>
      <p>A fast, simple, and secure messaging experience.</p>
      <button id="login-btn" class="btn-google">
        <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </button>
    </div>
  </div>

  <div id="app-screen" class="hidden">

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-top">
          <h2>Chats</h2>
          <button id="logout-btn" class="btn-logout">Sign out</button>
        </div>

        <div class="uid-card">
          <div class="uid-label">Your UID</div>
          <div class="uid-row">
            <input type="text" id="my-uid" readonly>
            <button id="copy-uid-btn" class="btn-copy">Copy</button>
          </div>
        </div>

        <form id="add-friend-form" class="add-friend-form">
          <input type="text" id="friend-uid-input" placeholder="Paste UID to start chat…" required>
          <button type="submit" class="btn-add">Add</button>
        </form>
      </div>

      <div id="friends-list">
        <div class="friends-empty">Loading contacts…</div>
      </div>
    </aside>

    <main class="chat-area">

      <div id="empty-chat">
        <div class="empty-icon"></div>
        <p>UID Chat for Web</p>
        <span>Send and receive messages seamlessly. Select a contact from the sidebar to start a conversation.</span>
      </div>

      <div id="active-chat" class="hidden">
        <header class="chat-header">
          <button class="back-btn" id="back-btn">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <div class="chat-header-avatar" id="chat-header-avatar">?</div>
          <div class="chat-header-info">
            <div id="chat-friend-name">—</div>
            <div class="chat-status">click here for contact info</div>
          </div>
        </header>

        <div id="chat-messages"></div>

        <form id="send-message-form">
          <input type="text" id="message-input" placeholder="Type a message" autocomplete="off">
          <button type="submit" class="btn-send">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </form>
      </div>

    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAjSyReKaDPkK59En1p4q0oLgPUeeKJ-ig",
      authDomain: "chat-app-db696.firebaseapp.com",
      projectId: "chat-app-db696",
      storageBucket: "chat-app-db696.firebasestorage.app",
      messagingSenderId: "855095524866",
      appId: "1:855095524866:web:9e37a81cf408704a43311b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let currentFriend = null;
    let friendsUnsubscribe = null;
    let chatUnsubscribe = null;

    // DOM
    const loginScreen   = document.getElementById('login-screen');
    const appScreen     = document.getElementById('app-screen');
    const myUidInput    = document.getElementById('my-uid');
    const friendsListEl = document.getElementById('friends-list');
    const emptyChat     = document.getElementById('empty-chat');
    const activeChat    = document.getElementById('active-chat');
    const chatMessages  = document.getElementById('chat-messages');
    const chatFriendName = document.getElementById('chat-friend-name');
    const chatHeaderAvatar = document.getElementById('chat-header-avatar');
    const sidebar       = document.getElementById('sidebar');

    // Toast helper
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    // Avatar initial
    function getInitial(name) {
      return name ? name[0].toUpperCase() : '?';
    }

    // Auth
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        loginScreen.classList.add('hidden');
        appScreen.classList.remove('hidden');
        myUidInput.value = user.uid;

        const userRef = doc(db, 'users', user.uid);
        const userSnap = await getDoc(userRef);
        if (!userSnap.exists()) {
          await setDoc(userRef, { uid: user.uid, displayName: user.displayName, email: user.email, friends: [] });
        }
        loadFriends();
      } else {
        currentUser = null;
        loginScreen.classList.remove('hidden');
        appScreen.classList.add('hidden');
      }
    });

    document.getElementById('login-btn').addEventListener('click', () => {
      signInWithPopup(auth, provider).catch(err => showToast(err.message));
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
      if (friendsUnsubscribe) friendsUnsubscribe();
      if (chatUnsubscribe) chatUnsubscribe();
      signOut(auth);
    });

    document.getElementById('copy-uid-btn').addEventListener('click', () => {
      navigator.clipboard.writeText(myUidInput.value).then(() => showToast('UID copied to clipboard')).catch(() => {
        myUidInput.select(); document.execCommand('copy'); showToast('UID copied to clipboard');
      });
    });

    // Add friend
    document.getElementById('add-friend-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const friendUid = document.getElementById('friend-uid-input').value.trim();
      if (!friendUid || friendUid === currentUser.uid) return showToast("Invalid UID — you can't add yourself.");
      try {
        const friendRef = doc(db, 'users', friendUid);
        const friendSnap = await getDoc(friendRef);
        if (friendSnap.exists()) {
          await updateDoc(doc(db, 'users', currentUser.uid), { friends: arrayUnion(friendUid) });
          await updateDoc(friendRef, { friends: arrayUnion(currentUser.uid) });
          document.getElementById('friend-uid-input').value = '';
          showToast('Contact added successfully!');
        } else {
          showToast('No user found with that UID.');
        }
      } catch (err) {
        showToast('Error: ' + err.message);
      }
    });

    // Load friends
    function loadFriends() {
      if (friendsUnsubscribe) friendsUnsubscribe();
      const userRef = doc(db, 'users', currentUser.uid);
      friendsUnsubscribe = onSnapshot(userRef, async (docSnap) => {
        if (!docSnap.exists()) return;
        const friendUids = docSnap.data().friends || [];
        if (friendUids.length === 0) {
          friendsListEl.innerHTML = '<div class="friends-empty">No contacts yet.<br>Share your UID to start chatting!</div>';
          return;
        }
        const friendsData = await Promise.all(
          friendUids.map(async (uid) => {
            const fSnap = await getDoc(doc(db, 'users', uid));
            return fSnap.exists() ? fSnap.data() : null;
          })
        );
        renderFriendsList(friendsData.filter(f => f !== null));
      });
    }

    function renderFriendsList(friends) {
      friendsListEl.innerHTML = '';
      friends.forEach(friend => {
        const div = document.createElement('div');
        div.className = `friend-item ${currentFriend?.uid === friend.uid ? 'active' : ''}`;
        div.innerHTML = `
          <div class="friend-avatar">${getInitial(friend.displayName)}</div>
          <div class="friend-info">
            <div class="friend-name">${friend.displayName}</div>
            <div class="friend-email">${friend.email}</div>
          </div>`;
        div.onclick = () => openChat(friend);
        friendsListEl.appendChild(div);
      });
    }

    // Open chat
    function openChat(friend) {
      currentFriend = friend;
      emptyChat.classList.add('hidden');
      activeChat.classList.remove('hidden');
      chatFriendName.textContent = friend.displayName;
      chatHeaderAvatar.textContent = getInitial(friend.displayName);

      // Mobile: slide sidebar out
      sidebar.classList.add('slide-out');

      loadFriends();

      const chatId = currentUser.uid > friend.uid
        ? `${currentUser.uid}_${friend.uid}`
        : `${friend.uid}_${currentUser.uid}`;

      if (chatUnsubscribe) chatUnsubscribe();

      const messagesRef = collection(db, 'chats', chatId, 'messages');
      const q = query(messagesRef, orderBy('createdAt', 'asc'));

      chatUnsubscribe = onSnapshot(q, (snapshot) => {
        chatMessages.innerHTML = '';
        snapshot.docs.forEach(docSnap => {
          const msg = docSnap.data();
          const isMe = msg.senderId === currentUser.uid;
          const msgDiv = document.createElement('div');
          msgDiv.className = `msg-bubble ${isMe ? 'msg-me' : 'msg-them'}`;
          msgDiv.textContent = msg.text;
          chatMessages.appendChild(msgDiv);
        });
        chatMessages.scrollTop = chatMessages.scrollHeight;
      });
    }

    // Send message
    document.getElementById('send-message-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const input = document.getElementById('message-input');
      const text = input.value.trim();
      if (!text || !currentFriend) return;
      input.value = '';

      const chatId = currentUser.uid > currentFriend.uid
        ? `${currentUser.uid}_${currentFriend.uid}`
        : `${currentFriend.uid}_${currentUser.uid}`;

      await addDoc(collection(db, 'chats', chatId, 'messages'), {
        text,
        senderId: currentUser.uid,
        createdAt: serverTimestamp()
      });
    });

    // Back button (mobile)
    document.getElementById('back-btn').addEventListener('click', () => {
      sidebar.classList.remove('slide-out');
    });
  </script>
</body>
</html>
